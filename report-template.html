<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>QA Toolkit System Report</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>QA Toolkit Report</h1>

<p>System Analysis Report</p>

</header>

<div class="container">

<h2>System Information</h2>

<table>

<tr>
<td>Computer Name</td>
<td>{{computer}}</td>
</tr>

<tr>
<td>Operating System</td>
<td>{{os}}</td>
</tr>

<tr>
<td>CPU</td>
<td>{{cpu}}</td>
</tr>

<tr>
<td>RAM</td>
<td>{{ram}}</td>
</tr>

</table>

<h2>Disk Usage</h2>

<table>

<tr>
<td>Drive</td>
<td>Total</td>
<td>Used</td>
<td>Free</td>
</tr>

</table>

<h2>Startup Programs</h2>

<p>{{startup}}</p>

<h2>System Health Score</h2>

<h1>{{score}}</h1>

</div>

<footer>

Generated by QA Toolkit

</footer>

</body>
</html>
